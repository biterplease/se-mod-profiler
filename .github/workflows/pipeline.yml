name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      confirm_upload:
        description: 'Type "yes" to publish SEProfiler.Lib to NuGet and update SEProfiler.xml'
        required: true
        default: 'no'

jobs:
  # --- CI STAGE ---
  build:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref_type == 'tag'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
      - name: Build SEProfiler.Lib
        run: dotnet build SEProfiler.Lib/SEProfiler.Lib.csproj -c Release
      - name: Build SEProfiler.Lib.Tests
        run: dotnet build SEProfiler.Lib.Tests/SEProfiler.Lib.Tests.csproj -c Release

  test:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
      - name: Run Lib Tests
        run: dotnet test SEProfiler.Lib.Tests/SEProfiler.Lib.Tests.csproj -c Release --logger "trx;LogFileName=results.trx"

  # --- CD STAGE ---
  tagging:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate and Push Tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  package_and_upload:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_upload == 'yes'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Get version from latest tag
        id: version
        shell: pwsh
        run: |
          $tag = git describe --tags --abbrev=0
          $ver = $tag.TrimStart('v')
          "TAG=$tag"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "tag=$tag  version=$ver"

      - name: Build SEProfiler.Lib
        run: dotnet build SEProfiler.Lib/SEProfiler.Lib.csproj -c Release -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack SEProfiler.Lib
        run: dotnet pack SEProfiler.Lib/SEProfiler.Lib.csproj -c Release -p:Version=${{ steps.version.outputs.VERSION }} --no-build --output nupkg/

      - name: Validate package contents
        shell: pwsh
        run: |
          $pkg = Get-ChildItem nupkg -Filter *.nupkg | Select-Object -First 1
          Write-Host "=== Package: $($pkg.Name) ==="
          $out = "nupkg\extracted"
          Expand-Archive -Path $pkg.FullName -DestinationPath $out -Force
          Write-Host "`n=== .nuspec ==="
          Get-Content (Get-ChildItem $out -Filter *.nuspec | Select-Object -First 1).FullName
          Write-Host "`n=== Files in package ==="
          Get-ChildItem $out -Recurse -File | ForEach-Object { $_.FullName.Substring((Resolve-Path $out).Path.Length + 1) }
          Write-Host "`n=== SEProfiler.Lib.dll referenced assemblies ==="
          $dll = Get-ChildItem $out -Recurse -Filter SEProfiler.Lib.dll | Select-Object -First 1
          if ($dll) {
              [System.Reflection.Assembly]::LoadFrom($dll.FullName).GetReferencedAssemblies() |
                  ForEach-Object { "  $($_.Name) $($_.Version)" }
          } else {
              Write-Host "  (dll not found in package)"
          }

      - name: Upload to NuGet
        shell: bash
        run: dotnet nuget push nupkg/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Update SEProfiler.xml Lib version and Commit
        shell: pwsh
        run: |
          ./ops/scripts/Update-Xml.ps1 -Version "${{ steps.version.outputs.VERSION }}" -CommitSha "${{ github.sha }}"

      - name: Commit and push SEProfiler.xml
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SEProfiler.xml
          TAG="v${{ steps.version.outputs.VERSION }}"
          git diff --staged --quiet || git commit -m "chore: update SEProfiler.xml (version ${TAG} / sha ${{ github.sha }}) [skip ci]"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}$"; then
            echo "Tag ${TAG} already exists on origin; skipping tag creation."
          else
            git tag -a "${TAG}" -m "release ${TAG}"
            git push origin "${TAG}"
          fi
          git push origin HEAD:main