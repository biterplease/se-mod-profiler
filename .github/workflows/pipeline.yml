name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- CI STAGE (Runs on PRs and Tags) ---
  build:
    if: github.event_name == 'pull_request' || github.ref_type == 'tag'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      
      - name: Build Packages
        run: # [Empty Script]
        
      - name: Cache Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: bin/ # Adjust path as needed

  test:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
      - name: Run Unit Tests
        run: # [Empty Script]

  # --- CD STAGE (Runs on Main after Merge) ---
  tagging:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate and Push Tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # This tool looks at commit messages (fix:, feat:, etc) to determine semver

  package_and_upload:
    # This job only runs when you manually trigger it via the Actions tab
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_upload == 'yes'
    runs-on: windows-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-artifact
      - name: Prepare & Validate
        run: # [Empty Script]
      - name: Upload to NuGet
        run: # [Empty Script]